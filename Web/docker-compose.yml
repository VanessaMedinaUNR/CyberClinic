name: CyberClinic Web Portal

services:

  frontend:
    container_name: cyberclinic-frontend
    environment:
      - REACT_APP_FRONTEND_SERVER=${FRONTEND_SERVER}
      - REACT_APP_FRONTEND_PORT=${FRONTEND_PORT}
      - REACT_APP_BACKEND_SERVER=http://${HOST}:${BACKEND_PORT}
    ports:
      - ${FRONTEND_PORT}:${FRONTEND_PORT}
    build:
      context: frontend
      dockerfile: Dockerfile
    depends_on:
      - ${BACKEND_SERVER}
    networks:
      - frontend
    command: npm start

  backend:
  #production backend not started by default. Use: docker compose --profile prod up
  #during development, backend-dev is used instead.
    profiles: [prod]
    container_name: cyberclinic-backend
    image: cyberclinic-backend
    build:
      context: backend
      target: builder
    volumes:
      - ./backend:/src
    environment:
      - SCAN_DIR=${SCAN_DIR:-/src/scans}
      - REPORT_DIR=${REPORT_DIR:-/src/reports}
    #web-related variables
      - FLASK_SERVER=0.0.0.0
      #-- Windows/Linux start
      - FLASK_PORT=${BACKEND_PORT:-5000}
      #-- windows/linux end

      #-- macOS start
      # - FLASK_PORT=${BACKEND_PORT:-5001}
      #-- macOS end
      - FLASK_DEBUG=${FLASK_DEBUG}
      - SECRET_KEY=${FLASK_SECRET_KEY}
    #standalone-related variables
      - VPN_PORT=${VPN_PORT}
      - VPN_CRT=${VPN_CRT}
      - VPN_KEY=${VPN_KEY}
    #databse-related variables
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}  
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    expose:
      - ${BACKEND_PORT}
    ports:
      - ${VPN_PORT}:${VPN_PORT}
      - ${BACKEND_PORT}:${BACKEND_PORT}
    #-- windows/linux start
    command: python3 main.py
    #-- windows/linux end

    #-- macOS start
    # working_dir: /src
    # command: python3 /src/main.py
    #-- macOS end
    depends_on:
      database:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: curl -f http://localhost:$$BACKEND_PORT/
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

  backend-dev:
    #-- windows/linux start
    container_name: cyberclinic-backend
    image: python:latest
    #-- windows/linux end

    #-- macOS start
    # container_name: cyberclinic-backend-dev
    # image: cyberclinic-backend-dev
    #-- macOS end

    build:
      context: backend
      target: builder
    environment:
      - SCAN_DIR=${SCAN_DIR-/src/scans}
      - REPORT_DIR=${REPORT_DIR:-/src/reports}
    #web-related variables
      - FLASK_SERVER=0.0.0.0
      #-- windows/linux start
      - FLASK_PORT=${BACKEND_PORT:-5000}
      #-- windows/linux end

      #-- macOS start
      # - FLASK_PORT=${BACKEND_PORT:-5001}
      #-- macOS end
      - FLASK_DEBUG=${FLASK_DEBUG}
      - SECRET_KEY=${FLASK_SECRET_KEY}
    #standalone-related variables
      - VPN_PORT=${VPN_PORT}
      - VPN_CRT=${VPN_CRT}
      - VPN_KEY=${VPN_KEY}
    #database-related variables
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}  
      - DB_PASS=${DB_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    #sysreptor-related variables
      - REPTOR_SERVER_URL=http://${REPTOR_SERVER}:${REPTOR_PORT}
      - REPTOR_API_TOKEN=${REPTOR_API_TOKEN}
    volumes:
      - ./backend:/src
    #-- windows/linux start
    ports:
      - ${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}
      - ${VPN_PORT}:${VPN_PORT}
    expose:
      - ${BACKEND_PORT:-5000}
    command: python3 main.py
    #-- windows/linux end

    #-- macOS start
    # ports:
    #   - ${BACKEND_PORT:-5001}:${BACKEND_PORT:-5001}
    # expose:
    #   - ${BACKEND_PORT:-5001}
    # working_dir: /src
    # command: python3 /src/main.py
    #-- macOS end

    networks:
      - backend
      - frontend
    depends_on:
      database:
        condition: service_healthy

  database:
    container_name: cyberclinic-database
    image: bitnami/postgresql:latest
    restart: unless-stopped
    environment:
      - POSTGRESQL_DATABASE=${DB_NAME}
      - POSTGRESQL_USERNAME=${DB_USER}
      - POSTGRESQL_PASSWORD=${DB_PASS}
      - POSTGRESQL_PORT_NUMBER=${DB_PORT}
      - POSTGRESQL_MAX_CONNECTIONS=100
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - ${DB_PORT}
    ports:
      - ${DB_PORT}:${DB_PORT}
    networks:
      - backend
    healthcheck:
      test: pg_isready -U $$DB_USER -d $$DB_NAME
      interval: 30s
      timeout: 30s
      start_period: 30s
      retries: 3

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

